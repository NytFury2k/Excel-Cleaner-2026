<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Logs — Paramantra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" href="https://paramantra.us/aldius/images/favicon.png" type="image/gif">
  <style>
    :root {
      --red-accent: #b91c1c;
      --red-hover: #991b1b;
      --red-light: #fee2e2;
      --red: var(--red-accent);
      --border: #e5e7eb;
      --surface: #f9fafb;
    }

    body {
      background: #f4f5f7;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .card-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      font-weight: 600;
    }

    .card-body {
      padding: 20px;
    }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }

    .form-control,
    .form-select {
      border-radius: 7px;
      border-color: var(--border);
      font-size: 0.88rem;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #fca5a5;
      box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.1);
    }

    .btn-danger,
    .btn-danger:focus {
      background: var(--red);
      border-color: var(--red);
    }

    .btn-danger:hover {
      background: var(--red-hover);
      border-color: var(--red-hover);
    }

    .btn-outline-danger {
      color: var(--red);
      border-color: var(--red);
    }

    .btn-outline-danger:hover {
      background: var(--red);
      color: #fff;
    }

    .table thead th {
      background: var(--surface);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .table td {
      vertical-align: middle;
      border-color: var(--border);
      font-size: 0.88rem;
    }

    .table-hover tbody tr:hover {
      background: #fef2f2;
    }

    .pagination .page-link {
      color: var(--red);
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 6px !important;
      margin: 0 2px;
      font-size: 0.83rem;
      padding: 5px 11px;
    }

    .pagination .page-link:hover {
      background: #fee2e2;
      color: var(--red-hover);
    }

    .pagination .page-item.active .page-link {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .pagination .page-item.disabled .page-link {
      background: #f3f4f6;
      color: #9ca3af;
    }

    .badge {
      font-weight: 500;
    }

    .alert {
      border-radius: 8px;
      font-size: 0.875rem;
    }

    .page-hdr h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 3px;
    }

    .page-hdr p {
      font-size: 0.875rem;
      color: #6b7280;
      margin: 0;
    }

    /* Hide ID and Date columns on very small screens to keep Action visible */
    @media (max-width: 575px) {
      .col-hide-xs {
        display: none;
      }

      .page-hdr h2 {
        font-size: 1.1rem;
      }

      .container {
        padding-left: 6px;
        padding-right: 6px;
      }

      .table td,
      .table th {
        padding-left: 6px;
        padding-right: 6px;
        font-size: 0.8rem;
      }
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
    }

    .content-area {
      flex: 1;
      margin-left: 260px;
      padding: 24px;
    }

    .sidebar-brand {
      background: var(--red-accent);
      padding: 20px;
      border-bottom: 1px solid var(--red-hover);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sidebar-brand h5 {
      margin: 0;
      font-weight: 700;
    }

    .sidebar-brand small {
      color: #6b7280;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      color: #374151;
      text-decoration: none;
      border-radius: 8px;
      margin: 4px 10px;
    }

    .sidebar-link:hover {
      background: #fef2f2;
      color: var(--red-accent);
    }

    .sidebar-link i {
      font-size: 1rem;
    }

    .sidebar-logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <div class="app-layout">

    {% include '_sidebar.html' %}

    <main class="content-area">
      <div class="container my-4 my-md-5">
        <div class="page-hdr mb-4 d-flex justify-content-between align-items-center">
          <div>
            <h2><i class="bi bi-journal-text me-2" style="color: var(--red-accent);"></i>System Logs</h2>
          </div>
          <div>
            <button class="btn btn-success" onclick="window.location.href='/api/logs/export';">
              <i class="bi bi-file-earmark-excel me-1"></i> Export Audit Logs
            </button>
          </div>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive" style="border-radius:10px;overflow:hidden;">
              <table class="table table-hover align-middle mb-0">
                <thead>
                  <tr>
                    <th style="width:55px;" class="col-hide-xs">ID</th>
                    <th style="min-width:80px;">User</th>
                    <th>Action</th>
                    <th style="width:140px;" class="col-hide-xs">Date</th>
                  </tr>
                </thead>
                <tbody>
                  {% for log in logs %}
                  <tr>
                    <td class="text-muted col-hide-xs" style="font-size:0.8rem;">{{ log.id }}</td>
                    <td class="fw-semibold" style="font-size:0.88rem;">{{ log.username }}</td>
                    <td style="font-size:0.85rem;max-width:400px;word-break:break-word;">
                      {{ log.action }}
                      {# Show date inline on mobile since the date column is hidden #}
                      <div class="d-sm-none mt-1" style="font-size:0.75rem;color:#9ca3af;">{{ log.created_at }}</div>
                    </td>
                    <td class="col-hide-xs" style="font-size:0.8rem;color:#6b7280;white-space:nowrap;">{{ log.created_at
                      }}</td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </main>
  </div>
</body>

</html>
