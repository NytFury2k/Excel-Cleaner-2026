<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>System Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="https://paramantra.us/aldius/images/favicon.png" type="image/gif">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container-fluid">
      <a class="navbar-brand"><img fetchpriority="high" width="180" height="35"
          src="https://paramantra.com/wp-content/uploads/2022/04/Paramantra-Logo-white-PNG-431X88.webp"
          class="attachment-full size-full wp-image-18495" alt="" decoding="async"
          sizes="(max-width: 1493px) 100vw, 1493px"></a>
      <div class="ms-auto">
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light">Back to Dashboard</a>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-light ms-2">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h3>System Logs</h3>
    <table class="table table-striped mt-3">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Action</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        {% for log in logs %}
        <tr>
          <td>{{ log.id }}</td>
          <td>{{ log.username }}</td>
          <td>{{ log.action }}</td>
          <td>{{ log.created_at }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>

</html>
