<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Register | ExcelCleaner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">
  <div class="card shadow-lg border-0 p-4" style="width: 26rem; border-radius: 15px;">
    <h4 class="text-center fw-bold mb-4">Create New Account</h4>
    <form method="post">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" name="username" id="regUser" placeholder="Username" required>
        <label for="regUser">Username</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" name="password" id="regPass" placeholder="Password" required>
        <label for="regPass">Password</label>
      </div>
      <div class="form-floating mb-4">
        <select class="form-select" name="role" id="regRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
        <label for="regRole">Select Role</label>
      </div>
      <button class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">REGISTER USER</button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('dashboard') }}" class="text-muted small">Return to Dashboard</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}<div class="alert alert-{{ messages[0][0] }} mt-3 py-2 small text-center">{{ messages[0][1] }}</div>{% endif %}
    {% endwith %}
  </div>
</body>
</html>
