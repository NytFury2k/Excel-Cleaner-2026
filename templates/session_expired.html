<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Expired — Paramantra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" href="https://paramantra.us/aldius/images/favicon.png" type="image/gif">
  
  <script>
    // Immediate execution script to prevent theme flash on load
    (function() {
      const currentTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', currentTheme);
    })();
  </script>

  <style>
    /* Theme variables */
    :root {
      --bg-primary: linear-gradient(135deg,#fff 0%,#fef2f2 55%,#fee2e2 100%);
      --bg-card: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --red-accent: #b91c1c;
      --red-hover: #991b1b;
    }

    [data-theme="dark"] {
      --bg-primary: linear-gradient(135deg,#0a0a0c 0%,#1a1010 55%,#251212 100%);
      --bg-card: #18181c;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: #2d2d34;
      --red-accent: #ef4444;
      --red-hover: #dc2626;
    }

    body { 
      background: var(--bg-primary) !important; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-family: system-ui,-apple-system,sans-serif; 
      color: var(--text-main) !important;
      transition: background 0.2s;
    }

    .exp-card { 
      background: var(--bg-card) !important; 
      border: 1px solid var(--border-color) !important; 
      border-radius: 16px; 
      box-shadow: 0 8px 32px rgba(185,28,28,0.09); 
      padding: 48px 40px 40px; 
      text-align: center; 
      max-width: 380px; 
      width: 100%; 
    }

    .icon-ring { 
      width: 64px; 
      height: 64px; 
      border-radius: 50%; 
      background: #fef2f2; 
      border: 2px solid #fee2e2; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      margin-bottom: 20px; 
    }
    
    [data-theme="dark"] .icon-ring {
      background: #451a1a;
      border-color: #5f2020;
    }

    h4 { 
      font-size: 1.2rem; 
      font-weight: 700; 
      color: var(--text-main) !important; 
      margin-bottom: 8px; 
    }

    p { 
      font-size: 0.88rem; 
      color: var(--text-muted) !important; 
      margin-bottom: 28px; 
    }

    .btn-login { 
      background: var(--red-accent) !important; 
      border: none; 
      border-radius: 8px; 
      color: #fff !important; 
      font-weight: 600; 
      font-size: 0.9rem; 
      padding: 10px 0; 
      width: 100%; 
      transition: background 0.15s; 
      display: block; 
      text-decoration: none; 
    }

    .btn-login:hover { 
      background: var(--red-hover) !important; 
      color: #fff !important; 
    }

    /* Fixed top-right theme toggle for session expired page */
    .btn-theme-toggle-login {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s, color 0.2s;
    }

    .btn-theme-toggle-login:hover {
      background-color: var(--border-color);
      color: var(--red-accent);
      border-color: var(--red-accent);
    }
  </style>
</head>
<body>
  <!-- Theme Toggle Button -->
  <button class="btn-theme-toggle-login" id="btnThemeToggle" title="Toggle Theme">
    <i class="bi bi-sun" id="themeIconSun"></i>
    <i class="bi bi-moon" id="themeIconMoon" style="display:none;"></i>
  </button>

  <div style="padding:0 16px; width: 100%; max-width: 380px;">
    <div class="exp-card">
      <div class="icon-ring">
        <i class="bi bi-clock-history" style="font-size:1.6rem;color:#b91c1c;"></i>
      </div>
      <h4>Session Expired</h4>
      <p>Your session has expired or is no longer valid.<br>Please sign in again to continue.</p>
      <a href="{{ url_for('login') }}" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Go to Login
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    (function() {
      const currentTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', currentTheme);
      
      function updateThemeUI(theme) {
        const sunIcon = document.getElementById('themeIconSun');
        const moonIcon = document.getElementById('themeIconMoon');
        if (sunIcon && moonIcon) {
          if (theme === 'dark') {
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'inline-block';
          } else {
            sunIcon.style.display = 'inline-block';
            moonIcon.style.display = 'none';
          }
        }
      }
      
      updateThemeUI(currentTheme);
      
      const btnThemeToggle = document.getElementById('btnThemeToggle');
      if (btnThemeToggle) {
        btnThemeToggle.addEventListener('click', function() {
          const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          localStorage.setItem('theme', theme);
          updateThemeUI(theme);
        });
      }
    })();
  </script>
</body>
</html>
