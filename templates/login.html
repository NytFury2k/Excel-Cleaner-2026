<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Login | ExcelCleaner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg border-0 p-5" style="width: 26rem; border-radius: 20px;">
      <div class="text-center mb-4">
        <img width="220" src="https://paramantra.com/wp-content/uploads/2022/04/Paramantra-Logo-e1754657963220.webp" class="mb-4">
        <h5 class="fw-bold">Welcome Back</h5>
        <p class="text-muted small">Please sign in to access your dashboard</p>
      </div>
      <form method="post">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" name="username" id="u" placeholder="Username" required>
          <label for="u">Username</label>
        </div>
        <div class="form-floating mb-4">
          <input type="password" class="form-control" name="password" id="p" placeholder="Password" required>
          <label for="p">Password</label>
        </div>
        <button class="btn btn-danger w-100 py-3 fw-bold rounded-pill">LOGIN</button>
      </form>
      {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="alert alert-danger mt-3 small text-center">{{ messages[0] }}</div>{% endif %}
      {% endwith %}
    </div>
  </div>
</body>
</html>
