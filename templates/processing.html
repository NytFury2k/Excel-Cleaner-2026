<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Processing Data | ExcelCleaner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .loader-card { max-width: 500px; border-radius: 20px; border-top: 5px solid #dc3545; }
        .spinner-border { width: 3rem; height: 3rem; }
        #progressPercent { font-size: 0.9rem; font-weight: bold; color: #dc3545; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card loader-card shadow-lg p-5 text-center bg-dark border-0">
        <div class="mb-4">
            <div class="spinner-border text-danger" role="status"></div>
        </div>
        <h3 id="statusTitle" class="fw-bold mb-3">Initializing Worker...</h3>
        <p class="text-muted">Our background worker is processing your file. Please do not refresh this page.</p>
        
        <div class="d-flex justify-content-between mb-1">
            <span class="text-muted small">Progress</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress mb-4" style="height: 12px; border-radius: 10px; background-color: #333;">
            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-danger" 
                 role="progressbar" style="width: 0%"></div>
        </div>

        <div class="alert alert-dark border-secondary py-2 small">
            <i class="bi bi-info-circle me-2"></i>Task ID: <span class="text-monospace">{{ task_id[:13] }}...</span>
        </div>
    </div>

    <script>
        const taskId = "{{ task_id }}";
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const statusTitle = document.getElementById('statusTitle');
        
        function checkStatus() {
            fetch(`/task_status/${taskId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.state === 'PROGRESS') {
                        let percent = data.result.percent || 0;
                        let status = data.result.status || "Cleaning...";
                        
                        progressBar.style.width = percent + "%";
                        progressPercent.innerText = percent + "%";
                        statusTitle.innerText = status;

                        setTimeout(checkStatus, 1000);

                    } else if (data.state === 'SUCCESS') {
                        progressBar.style.width = "100%";
                        progressPercent.innerText = "100%";
                        statusTitle.innerText = "Cleaning Complete!";

                        const res = data.result;

                        if (!res || !res.file || res.file === 'null') {
                            console.error("Task reported success but file path is invalid:", res);
                            statusTitle.innerText = "Error: Result path missing";
                            return;
                        }

                        const params = new URLSearchParams();
                        params.append('total', res.total || 0);
                        params.append('valid', res.valid || 0);
                        params.append('invalid', res.invalid || 0);
                        params.append('health_score', res.health_score || 0); // Passes score to next page
                        params.append('file', res.file);
                        params.append('invalid_file', res.invalid_file || '');
                        params.append('preview_table', res.preview_table || '');

                        setTimeout(() => {
                            window.location.href = `/preview_results?${params.toString()}`;
                        }, 800);

                    } else if (data.state === 'FAILURE') {
                        alert("Processing failed: " + (data.error || "Check worker logs"));
                        window.location.href = "/upload";
                    } else {
                        setTimeout(checkStatus, 2000);
                    }
                })
                .catch(err => {
                    console.error("Polling error:", err);
                    setTimeout(checkStatus, 3000);
                });
        }

        checkStatus();
    </script>
</body>
</html>
