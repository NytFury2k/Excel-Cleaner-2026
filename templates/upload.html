<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Upload | ExcelCleaner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-body-tertiary">
  <div class="container d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg border-0 p-5 text-center" style="max-width: 450px; border-radius: 20px;">
      <div class="mb-4">
        <div class="bg-danger-subtle text-danger rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
          <i class="bi bi-file-earmark-spreadsheet" style="font-size: 2.5rem;"></i>
        </div>
      </div>
      <h3 class="fw-bold">Upload Data</h3>
      <p class="text-muted mb-4">Select an Excel file to begin cleaning.</p>
      
      <form method="POST" enctype="multipart/form-data">
        <div class="mb-4">
          <input type="file" class="form-control form-control-lg" name="file" required>
        </div>
        <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold shadow">NEXT STEP <i class="bi bi-chevron-right ms-2"></i></button>
      </form>
      <a href="{{ url_for('dashboard') }}" class="btn btn-link text-muted mt-3">Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
